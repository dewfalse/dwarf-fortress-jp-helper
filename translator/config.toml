[translator]
# 使用する翻訳エンジン: "google" または "deepl"
engine = "google"
# 翻訳先言語コード
# 例: "ja" / "en" / "ko" / "zh-CN"
target_language = "ja"

[deepl]
# DeepL API キー
# 環境変数 DEEPL_API_KEY でも指定できる（設定されていればそちらを優先）
api_key = ""

[overlay]
# 翻訳ツールチップの透過率（0.05 ～ 1.0）
# 1.0 に近いほど濃く、低いほど元テキストが見えやすい
tooltip_opacity = 0.78
# all text モードで重なったツールチップを縦にどれくらいずらすか
# 0.5 = 半分ずらす / 1.0 = 完全にずらす
all_text_vertical_shift_ratio = 1.0
# モード切り替えホットキー
# "ctrl" / "shift" / "alt"
toggle_hotkey = "ctrl"

[debug]
# true にすると受信テキストを debug.log に記録する
log = true
